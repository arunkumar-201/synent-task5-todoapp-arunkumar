<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Todo App</title>

  <!-- Bootstrap -->
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  />

  <!-- Font Awesome -->
  <script
    src="https://kit.fontawesome.com/d1c2ea8b80.js"
    crossorigin="anonymous"
  ></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="main-container">

    <div class="todo-card">

      <h1 class="app-title">Todo List</h1>

      <p class="app-subtitle">
        Organize your daily tasks easily
      </p>

      <div class="input-container">

        <input
          type="text"
          id="todoUserInput"
          class="todo-user-input"
          placeholder="Add a new task..."
        />

        <button class="button" id="addTodoButton">
          <i class="fas fa-plus"></i>
          Add
        </button>

      </div>

      <div class="tasks-header">

        <h2 class="tasks-title">My Tasks</h2>

        <button class="save-btn" id="saveTodoButton">
          <i class="fas fa-save"></i>
          Save
        </button>

      </div>

      <ul
        class="todo-items-container"
        id="todoItemsContainer"
      ></ul>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
